<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portuguese Practice v0.2.0</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 15px;
  background: #f4f4f2;
}
select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 18px;
}
.word {
  font-size: 40px;
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}
.note, .say, .status {
  text-align: center;
  margin-top: 10px;
}
audio {
  width: 100%;
  margin-top: 12px;
}
.small {
  margin-top: 18px;
  font-size: 15px;
  color: #555;
}
</style>
</head>

<body>

<h2>Portuguese Pronunciation Practice</h2>
<div>Version 0.2.0 · structured drill build</div>

<label for="ruleSelect">Choose a rule</label>
<select id="ruleSelect"></select>

<div class="word" id="wordText"></div>
<div class="say" id="sayText"></div>
<div class="note" id="noteText"></div>

<button onclick="speak()">🔊 Hear model</button>
<button onclick="startCountdown()">🎙️ Record me</button>
<button onclick="stopRecording()" id="stopBtn" disabled>⏹ Stop</button>

<audio id="playback" controls></audio>

<button onclick="nextWord()">➡️ Next word</button>
<button onclick="retry()">🔁 Retry</button>

<div class="status" id="statusText"></div>

<div class="small">
Cycle: hear → record → replay → retry or next
</div>

<script>
const DATA = {
 "Final s → sh": ["livros","dois","portugueses"],
 "Weak vowels": ["telefone","pequeno","presidente"],
 "Throaty r": ["carro","rua","arroz"],
 "Hard t": ["noite","vinte","tia"],
 "Hard d": ["cidade","dia","saudade"],
 "Dark l": ["Portugal","Brasil","papel"],
 "lh": ["filho","trabalho","velha"],
 "nh": ["vinho","senhor","amanhã"]
};

const select = document.getElementById("ruleSelect");
const wordText = document.getElementById("wordText");
const sayText = document.getElementById("sayText");
const noteText = document.getElementById("noteText");
const statusText = document.getElementById("statusText");
const playback = document.getElementById("playback");
const stopBtn = document.getElementById("stopBtn");

let currentRule = "";
let words = [];
let index = 0;
let recorder;
let chunks = [];

for (let rule in DATA) {
 let o = document.createElement("option");
 o.text = rule;
 select.appendChild(o);
}

select.onchange = loadRule;
loadRule();

function loadRule() {
 currentRule = select.value;
 words = DATA[currentRule];
 index = 0;
 update();
}

function update() {
 let w = words[index];
 wordText.innerText = w;
 sayText.innerText = "Say it clearly";
 noteText.innerText = currentRule;
 statusText.innerText = "";
}

function nextWord() {
 index = (index + 1) % words.length;
 update();
}

function retry() {
 statusText.innerText = "Try again";
}

function speak() {
 speechSynthesis.cancel();
 let u = new SpeechSynthesisUtterance(wordText.innerText);
 u.lang = "pt-PT";
 u.rate = 0.75;
 speechSynthesis.speak(u);
}

function startCountdown() {
 statusText.innerText = "Recording in 2...";
 setTimeout(()=>statusText.innerText="Recording in 1...",1000);
 setTimeout(startRecording,2000);
}

async function startRecording() {
 try {
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  recorder = new MediaRecorder(stream);
  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const blob = new Blob(chunks, {type:"audio/webm"});
    playback.src = URL.createObjectURL(blob);
    statusText.innerText = "Replay and compare";
    stream.getTracks().forEach(t=>t.stop());
  };

  recorder.start();
  stopBtn.disabled = false;
  statusText.innerText = "Recording...";
 } catch(e) {
  statusText.innerText = "Mic blocked";
 }
}

function stopRecording() {
 recorder.stop();
  stopBtn.disabled = true;
}
</script>

</body>
</html>
